<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoofVantage — Sales Trainer v1.2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* === ALL ORIGINAL CSS (unchanged) === */
:root {
  --navy: #003865; --navy2: #002850; --navy3: #001e3a; --navy4: #00508a; --navy5: #006A8E;
  --gold: #D38328; --gold2: #ED8800; --gold3: #f5a030; --gold-dim: rgba(237,136,0,0.10); --gold-glow: rgba(237,136,0,0.25);
  --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.16); --hdr-border: rgba(255,255,255,0.12);
  --teal: #007FA3; --teal2: #006A8E; --teal-dim: rgba(0,127,163,0.08);
  --bg: #f5f6f8; --surface: #ffffff; --sidebar: #f0f2f5; --card: #ffffff; --card2: #f8f9fb;
  --text: #1a2540; --text2: #3d4f6e; --muted: #7a8aaa;
  --green: #1a9e6a; --red: #d94040; --blue: #007FA3; --amber: #c47a00; --purple: #5b6fa8;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.65;display:flex;flex-direction:column;height:100vh;}
/* ... (all your original styles are preserved - abbreviated here for brevity) ... */
</style>
</head>
<body>

<!-- API KEY MODAL -->
<div class="apikey-overlay show" id="apikeyOverlay">... (original modal unchanged) ...</div>

<div class="hdr">
  <div class="logo">... (logo unchanged) ...</div>
  <div class="tabs">... (tabs unchanged) ...</div>
  <div class="hdr-right">
    <div class="progress-pill" id="gProgress">0 / 19 complete</div>
    <span id="versionTag" style="color:rgba(255,255,255,0.7);font-size:12px;margin:0 12px;">v1.2</span>
    <button onclick="openSettings()" title="Settings" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);width:34px;height:34px;border-radius:7px;cursor:pointer;font-size:16px;">⚙️</button>
  </div>
</div>

<div class="prog-line"><div class="prog-line-inner" id="progInner" style="width:0%"></div></div>

<div class="app-body">
  <!-- LEARN TAB (unchanged) -->
  <div class="tab-panel active" id="p-learn">... (original learn content) ...</div>

  <!-- SIMULATE TAB -->
  <div class="tab-panel" id="p-simulate">
    <!-- Setup Screen (unchanged) -->
    <div class="sim-setup" id="simSetup">... (original setup) ...</div>

    <!-- ACTIVE SIMULATION -->
    <div class="sim-active" id="simActive">
      <div class="sim-topbar">
        <div class="sim-badges">... (original badges) ...</div>
        <div class="sim-stats">... (original stats) ...</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <button id="simCustTtsBtn" onclick="toggleTTS('cust')" class="tts-toggle-btn tts-on">🔊 Customer</button>
          <button id="simRepTtsBtn" onclick="toggleTTS('rep')" class="tts-toggle-btn tts-on">🔊 You</button>
          <button onclick="redoLastResponse()" style="background:rgba(0,127,163,0.25);border:1px solid rgba(0,127,163,0.6);color:#7fd4f0;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;">↻ Redo Last</button>
          <button onclick="resetCurrentConversation()" class="btn-end">Reset Chat</button>
          <button class="btn-end" onclick="endSim()">End & Score</button>
        </div>
      </div>
      <div class="sim-body">
        <div class="sim-chat">
          <div class="sim-msgs" id="simMsgs"></div>
          <div class="sim-input">
            <div class="sim-row">
              <textarea class="chat-ta" id="simInput" placeholder="Respond to the customer…" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendSim();}"></textarea>
              <button class="btn-mic" id="simMic" onclick="toggleMic('sim')" title="Voice Input">🎤</button>
              <button class="btn-send" onclick="sendSim()">➤</button>
            </div>
          </div>
        </div>
        <div class="coaching-col">... (original coaching sidebar) ...</div>
      </div>
    </div>
  </div>
</div>

<script>
// ==================== ROOFVANTAGE TRAINER v1.2 ====================
const APP_VERSION = "v1.2";

let ANTHROPIC_KEY = "", OPENAI_KEY = "", ELEVENLABS_KEY = "";
let ttsEnabled = {cust: true, rep: true};
let autoMicEnabled = false;
let lastUserMessage = null;
let sim = {running:false, msgs:[], exch:0, stages:new Set(), grades:[], coachLog:[]};
let mic = {on:false, rec:null};
let mediaRecorder, recordedChunks = [];

// ==================== NEW VOICE & MIC LOGIC ====================
function selOpt(el){
  const g=el.dataset.g;
  document.querySelectorAll(`[data-g="${g}"]`).forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
  cfg[g]=el.dataset.v;

  if(g==='voice'){
    autoMicEnabled = (cfg.voice === 'mic' || cfg.voice === 'full');
  }
}

async function speakText(txt, who){
  if(!ttsEnabled[who]) return;
  // Prevent overlap
  await new Promise(r => setTimeout(r, 600));
  if(ELEVENLABS_KEY) await speakElevenLabs(txt,who);
  else if(OPENAI_KEY) await speakOpenAI(txt,who);
  else speakBrowser(txt,who);
}

async function toggleMic(ctx){
  const btn = document.getElementById('simMic');
  if(mic.on){ mic.rec?.stop(); mediaRecorder?.stop(); return; }

  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder = new MediaRecorder(stream);
    recordedChunks = [];

    mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, {type:'audio/webm'});
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.play();
    };

    // Speech Recognition
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    mic.rec = new SR();
    mic.rec.continuous = true; mic.rec.interimResults = true; mic.rec.lang = 'en-US';

    mic.rec.onresult = e => {
      let final = '';
      for(let i = e.resultIndex; i < e.results.length; i++){
        if(e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
      }
      if(final) document.getElementById('simInput').value = final.trim();
    };

    mediaRecorder.start();
    mic.rec.start();
    mic.on = true;
    btn.classList.add('listening');
  } catch(e){ toast('Microphone access denied or not available'); }
}

// ==================== REDO & RESET ====================
function redoLastResponse(){
  if(!lastUserMessage){ toast('No previous response'); return; }
  document.getElementById('simInput').value = lastUserMessage;
  toast('Last response loaded — edit & send again');
}

function resetCurrentConversation(){
  if(!confirm('Reset current conversation?')) return;
  document.getElementById('simMsgs').innerHTML = '';
  document.getElementById('coachFeed').innerHTML = `<div class="c-item tip"><div class="c-lbl tip">Tip</div><ul class="c-bullets"><li class="c-bullet">Start with your greeting.</li></ul></div>`;
  sim.msgs = []; sim.exch = 0; sim.stages = new Set(); sim.grades = []; sim.coachLog = [];
  updateStageBar();
  document.getElementById('simExch').textContent = '0';
  toast('Conversation reset');
}

// ==================== PATCH SEND SIM ====================
const originalSendSim = sendSim || function(){};
sendSim = async function(){
  const inp = document.getElementById('simInput');
  const txt = inp.value.trim();
  if(!txt || !sim.running) return;
  lastUserMessage = txt;
  inp.value = '';
  await originalSendSim.call(this); // or paste full logic if needed
};

// ==================== START SIM - Auto TTS & Mic ====================
async function startSim(){
  // ... (keep your original startSim logic) ...
  ttsEnabled.cust = true; ttsEnabled.rep = true;
  document.getElementById('simCustTtsBtn').classList.add('tts-on');
  document.getElementById('simRepTtsBtn').classList.add('tts-on');

  if(autoMicEnabled){
    setTimeout(() => toggleMic('sim'), 1000);
  }
}

// ==================== INIT ====================
function init(){
  console.log(`%cRoofVantage Sales Trainer ${APP_VERSION} loaded`, 'color:#ED8800;font-weight:bold');
  document.getElementById('versionTag').textContent = APP_VERSION;
  buildLearn();
  updateProg();
  loadApiKey();
}
init();
</script>
</body>
</html>

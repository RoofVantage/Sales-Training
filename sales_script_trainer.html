<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roofing Sales Script</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --card: #1e2333;
    --border: #2a3048;
    --accent: #e8a020;
    --accent2: #4a9eff;
    --text: #e8eaf0;
    --muted: #7a8099;
    --success: #3ecf8e;
    --danger: #f05c5c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0d1020 0%, #1a2040 100%);
    border-bottom: 2px solid var(--accent);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .header-left p {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-bar-outer {
    width: 200px;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 12px;
    color: var(--muted);
    min-width: 70px;
    text-align: right;
  }

  /* LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 73px);
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    overflow-y: auto;
    position: sticky;
    top: 73px;
    height: calc(100vh - 73px);
  }
  .sidebar-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 20px 12px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.2s;
    border-left: 3px solid transparent;
    font-size: 13px;
    color: var(--muted);
  }
  .nav-item:hover { background: var(--card); color: var(--text); }
  .nav-item.active {
    background: var(--card);
    border-left-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }
  .nav-item.done { color: var(--success); }
  .nav-item.done .nav-dot { background: var(--success); }
  .nav-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .nav-item.active .nav-dot { background: var(--accent); }
  .nav-num {
    font-size: 10px;
    color: var(--muted);
    min-width: 18px;
  }

  /* MAIN CONTENT */
  .main {
    padding: 40px 48px;
    max-width: 860px;
  }

  .section { display: none; }
  .section.active { display: block; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(232,160,32,0.12);
    border: 1px solid rgba(232,160,32,0.3);
    border-radius: 99px;
    padding: 4px 14px;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .section-subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  /* OBJECTIVE CARD */
  .objective {
    background: rgba(74,158,255,0.08);
    border: 1px solid rgba(74,158,255,0.2);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 28px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .objective-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
  .objective-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 4px;
  }
  .objective-text { font-size: 14px; color: var(--text); }

  /* LINES */
  .lines { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }

  .line-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .line-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--border);
    transition: background 0.2s;
  }
  .line-card:hover { border-color: rgba(232,160,32,0.3); }
  .line-card:hover::before { background: var(--accent); }
  .line-card.revealed { background: #1a2035; }
  .line-card.revealed::before { background: var(--accent); }

  .line-tag {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .tag-say { color: var(--accent); }
  .tag-think { color: var(--accent2); }
  .tag-ask { color: var(--success); }
  .tag-close { color: var(--danger); }
  .tag-objection { color: #c084fc; }

  .line-text {
    font-size: 15px;
    color: var(--text);
    line-height: 1.6;
  }
  .line-text.hidden {
    filter: blur(5px);
    user-select: none;
    transition: filter 0.3s;
  }
  .line-hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    font-style: italic;
  }

  /* KEY POINTS */
  .key-points {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 28px;
  }
  .key-points-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .key-point {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .key-point:last-child { border-bottom: none; }
  .key-point-bullet {
    color: var(--accent);
    font-weight: 700;
    flex-shrink: 0;
  }

  /* PRICE TABLE */
  .price-table {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .price-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .price-row:last-child { border-bottom: none; }
  .price-row.header {
    background: rgba(232,160,32,0.08);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .price-val { color: var(--accent); font-weight: 600; }
  .price-reason { color: var(--muted); font-size: 12px; }

  /* OBJECTION CARDS */
  .objection-block {
    background: rgba(240,92,92,0.06);
    border: 1px solid rgba(240,92,92,0.2);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 16px;
  }
  .objection-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--danger);
    margin-bottom: 8px;
  }
  .objection-text {
    font-size: 15px;
    color: var(--text);
    font-style: italic;
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(240,92,92,0.15);
  }
  .response-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--success);
    margin-bottom: 8px;
  }
  .response-text { font-size: 14px; color: var(--text); }

  /* QUIZ */
  .quiz-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .quiz-q {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 16px;
    color: var(--text);
  }
  .quiz-options { display: flex; flex-direction: column; gap: 8px; }
  .quiz-option {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
    color: var(--text);
  }
  .quiz-option:hover { border-color: var(--accent); background: rgba(232,160,32,0.05); }
  .quiz-option.correct { border-color: var(--success); background: rgba(62,207,142,0.08); color: var(--success); }
  .quiz-option.wrong { border-color: var(--danger); background: rgba(240,92,92,0.08); color: var(--danger); }
  .quiz-feedback {
    margin-top: 12px;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 8px;
    display: none;
  }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.good { background: rgba(62,207,142,0.08); color: var(--success); border: 1px solid rgba(62,207,142,0.2); }
  .quiz-feedback.bad { background: rgba(240,92,92,0.08); color: var(--danger); border: 1px solid rgba(240,92,92,0.2); }

  /* BUTTONS */
  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 36px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .btn {
    padding: 12px 28px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    letter-spacing: 0.5px;
  }
  .btn-primary {
    background: var(--accent);
    color: #0f1117;
  }
  .btn-primary:hover { background: #f5b030; transform: translateY(-1px); }
  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { color: var(--text); border-color: var(--muted); }
  .btn-reveal {
    background: rgba(232,160,32,0.1);
    color: var(--accent);
    border: 1px solid rgba(232,160,32,0.3);
    font-size: 12px;
    padding: 8px 16px;
    margin-bottom: 16px;
  }
  .btn-reveal:hover { background: rgba(232,160,32,0.2); }

  /* FLASH CARDS */
  .flashcard-wrap {
    perspective: 1000px;
    margin-bottom: 24px;
  }
  .flashcard {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px;
    min-height: 160px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
  }
  .flashcard:hover { border-color: rgba(232,160,32,0.3); }
  .flashcard-face { font-size: 16px; color: var(--text); }
  .flashcard-back {
    display: none;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 14px;
    color: var(--accent);
    font-style: italic;
  }
  .flashcard.flipped .flashcard-back { display: block; }
  .flip-hint {
    position: absolute;
    top: 12px;
    right: 16px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* CHIPS */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 4px 14px;
    font-size: 12px;
    color: var(--muted);
  }
  .chip.accent { border-color: rgba(232,160,32,0.4); color: var(--accent); background: rgba(232,160,32,0.06); }

  /* DIVIDER */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  /* COMPLETE BANNER */
  .complete-banner {
    background: rgba(62,207,142,0.08);
    border: 1px solid rgba(62,207,142,0.25);
    border-radius: 12px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }
  .complete-icon { font-size: 28px; }
  .complete-text h3 { color: var(--success); font-size: 16px; margin-bottom: 4px; }
  .complete-text p { font-size: 13px; color: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Roofing Sales Script</h1>
    <p>Raleigh &amp; Wilmington, NC — Training Guide</p>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progressBar" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressLabel">0 / 19</div>
  </div>
</div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-title">Sections</div>
    <div id="navItems"></div>
  </div>

  <!-- MAIN -->
  <div class="main" id="mainContent"></div>

</div>

<script>
const sections = [
  {
    id: 1,
    title: "Introduction & Framing",
    badge: "Opening",
    subtitle: "Set the tone immediately. Make them feel like a partner, not a customer.",
    objective: { icon: "🤝", text: "Build instant trust and frame the visit as a collaborative walkthrough, not a sales pitch." },
    lines: [
      { tag: "say", text: "Thanks again for having me out today." },
      { tag: "say", text: "What I'm going to do is walk you through exactly how we do things, start to finish." },
      { tag: "say", text: "By the time we're done, there won't be a single thing happening on your roof that you don't already know about." },
      { tag: "say", text: "This is a team thing — me and you are going to go through this together so there are no surprises." },
    ],
    keyPoints: [
      "Use 'team' language — 'me and you,' 'together,' 'no surprises'",
      "You're a guide, not a salesperson at this stage",
      "Sets expectation of full transparency before price ever comes up",
    ],
    quiz: [
      { q: "What is the main goal of your opening lines?", options: ["Get to the price quickly", "Build trust and frame it as a team effort", "Talk about your competitors", "Ask about their budget"], correct: 1, feedback: "Correct! The opening is about building rapport and framing the visit as collaborative — not selling yet." }
    ]
  },
  {
    id: 2,
    title: "Industry Failure Rates",
    badge: "Credibility",
    subtitle: "Plant the seed of risk early. They need to understand who they're really buying from.",
    objective: { icon: "📊", text: "Establish urgency around contractor selection. Make them think beyond price to longevity." },
    lines: [
      { tag: "say", text: "Let me start with the industry, because who you hire matters as much as the price." },
      { tag: "say", text: "In the home improvement world, if 100 contractors start today, within one year, about 50 of them will be out of business." },
      { tag: "say", text: "Within five years, around 96% of them are gone." },
      { tag: "say", text: "Roofing is usually even worse than that." },
      { tag: "say", text: "So when you're choosing a contractor, you're not just buying today's price — you're buying who's still going to be around if there's an issue later." },
    ],
    keyPoints: [
      "50% gone in 1 year, 96% gone in 5 years — memorize these numbers",
      "Roofing failure rates are even higher than general contractors",
      "Reframe the purchase: it's not about price, it's about who's still around later",
    ],
    quiz: [
      { q: "What percentage of contractors are gone within 5 years?", options: ["50%", "75%", "96%", "80%"], correct: 2, feedback: "96%! And roofing is even worse. This stat makes price seem less important than longevity." }
    ]
  },
  {
    id: 3,
    title: "Types of Companies",
    badge: "Positioning",
    subtitle: "Define the landscape. Let them see where everyone else falls short before you introduce yourself.",
    objective: { icon: "🎯", text: "Position your company favorably against the 3 archetypes without bashing competitors directly." },
    lines: [
      { tag: "say", text: "Now, let me show you the kinds of companies you could be working with.", tag2: "Investor-Owned" },
      { tag: "say", text: "First, you have the big investor-owned companies — CEO, CFO, layers of management. They have to keep prices high just to cover all those margins. On a roof like yours, $20–30K, sometimes $50K." },
      { tag: "say", text: "Next, the family-owned companies. I like family businesses — the challenge is they stretch thin on resources and schedule flexibility. Insurance deadlines? They can struggle to fit you in. We keep specific slots open for exactly that situation.", tag2: "Family-Owned" },
      { tag: "say", text: "And then you've got what I call the 'Chuck in a Truck' guys. Cheapest materials, cheapest price — but that's where corners get cut. That's when people call us back to fix leaks or redo the job.", tag2: "Chuck in a Truck" },
      { tag: "say", text: "My job today is to show you how we're different from all of that, and then let you decide what makes the most sense for your home." },
    ],
    keyPoints: [
      "3 buckets: Investor-owned (expensive), Family (unreliable), Chuck in a Truck (cut corners)",
      "Don't bash — just describe the weaknesses factually",
      "End with 'let YOU decide' — keeps pressure off",
      "Mention schedule slots for insurance deadlines — this is a differentiator",
    ],
    quiz: [
      { q: "How do you end the competitor section?", options: ["Tell them we're the best", "Let them decide what makes sense for their home", "Show them our price is lower", "Mention we've been in business 15 years"], correct: 1, feedback: "Always hand the decision back to them. 'Let you decide' removes pressure and builds trust." }
    ]
  },
  {
    id: 4,
    title: "Who We Are",
    badge: "Credentials",
    subtitle: "Establish authority quickly. Licensed, insured, documented — say it simply.",
    objective: { icon: "🏆", text: "Build credibility with credentials without boring them. Offer the paperwork proactively." },
    lines: [
      { tag: "say", text: "We're a licensed general contractor." },
      { tag: "say", text: "We're actually a little overqualified for the roofing world — we could build a skyscraper in your backyard if we wanted to." },
      { tag: "say", text: "We're also fully insured. If you'd like to see our license or insurance paperwork, I can send that right over — a lot of people like to have that for their records." },
      { tag: "say", text: "We run a very professional, documented process. We want you to feel like you know exactly what's happening the whole time." },
    ],
    keyPoints: [
      "Licensed general contractor = overqualified for roofing (use the skyscraper line — it's memorable)",
      "Always offer the paperwork proactively — most won't ask but it builds trust",
      "'Documented process' sets up the project manager story in the next section",
    ]
  },
  {
    id: 5,
    title: "Project Manager & Documentation",
    badge: "Process",
    subtitle: "This is a major differentiator. Most companies don't have a dedicated PM on site.",
    objective: { icon: "📸", text: "Paint a picture of a professional, photo-documented job that protects the homeowner long-term." },
    lines: [
      { tag: "say", text: "One big difference with us is that you get a dedicated project manager on site." },
      { tag: "say", text: "He's there before the crew shows up. He makes sure all the materials are correct." },
      { tag: "say", text: "He takes pictures before, during, and after the job. So everything we go over today is exactly what gets put on your roof and you'll see it all in those photos." },
      { tag: "say", text: "When we're done, you get a written report with those images." },
      { tag: "say", text: "That way, if insurance ever comes out here years from now and says, 'I don't think this was installed properly,' you can say, 'Actually, yes it was — here are the pictures to prove it.'" },
    ],
    keyPoints: [
      "PM arrives BEFORE crew — sets expectations, checks materials",
      "Before, during, and after photos — this is the proof layer",
      "The insurance scenario is powerful — it makes documentation feel protective, not bureaucratic",
      "Written report with images = tangible deliverable they can keep",
    ]
  },
  {
    id: 6,
    title: "Mission & Relationship",
    badge: "Connection",
    subtitle: "Short section. Humanize the transaction. You're not just a contractor.",
    objective: { icon: "🤙", text: "Build personal connection. Make them feel like you'll be accessible after the sale." },
    lines: [
      { tag: "say", text: "Our mission is to make this a smooth, professional process for you." },
      { tag: "say", text: "We keep a good streamline of communication the whole way." },
      { tag: "say", text: "This is teamwork — we're working towards the same goal: getting this roof done right, one time, so you don't have to worry about it." },
      { tag: "say", text: "I'll give you my direct number — me and you are basically friends after this." },
    ],
    keyPoints: [
      "'Done right, one time' — this phrase sticks",
      "Give your direct number — shows accountability",
      "'Basically friends' — lowers their guard without being cheesy",
    ]
  },
  {
    id: 7,
    title: "Shingle Manufacturers",
    badge: "Products",
    subtitle: "Don't bash competitors' materials. Just show why CertainTeed Landmark wins on weight and durability.",
    objective: { icon: "🏠", text: "Get a 'yes' on the weight = durability logic. This yes carries into the warranty section." },
    lines: [
      { tag: "say", text: "The top shingle manufacturers in our world are GAF and CertainTeed. They all make good shingles — their warranties are very similar. I don't bash any of them." },
      { tag: "say", text: "Where we're different is we use CertainTeed Landmark shingles. They're a little bit heavier than some of the others — you can even see it when you compare them side by side." },
      { tag: "ask", text: "Would you agree that having that extra weight usually means a little more durability on your roof?" },
      { tag: "think", text: "Wait for the 'Yes.' Most people agree. This micro-commitment builds toward the close." },
      { tag: "say", text: "Most people do. So there's no downside in terms of warranty or shingle quality — we just give you that extra durability because of the added weight." },
    ],
    keyPoints: [
      "Don't bash GAF or others — say they're all good, then differentiate",
      "The weight = durability question is a YES close — get the nod",

const tagLabels = {
  say: "SAY",
  think: "INTERNAL",
  ask: "ASK",
  close: "CLOSE",
  objection: "OBJECTION"
};

const tagColors = {
  say: "tag-say",
  think: "tag-think",
  ask: "tag-ask",
  close: "tag-close",
  objection: "tag-objection"
};

let completed = new Set();
let currentSection = 0;

function buildNav() {
  const nav = document.getElementById('navItems');
  sections.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'nav-item' + (i === 0 ? ' active' : '');
    el.id = 'nav-' + i;
    el.innerHTML = `<span class="nav-num">${String(s.id).padStart(2,'0')}</span><span class="nav-dot"></span><span>${s.title}</span>`;
    el.onclick = () => goTo(i);
    nav.appendChild(el);
  });
}

function buildSections() {
  const main = document.getElementById('mainContent');
  sections.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'section' + (i === 0 ? ' active' : '');
    div.id = 'section-' + i;

    let html = `
      <div class="section-badge">${s.badge}</div>
      <div class="section-title">${s.title}</div>
      <div class="section-subtitle">${s.subtitle}</div>
    `;

    if (s.objective) {
      html += `<div class="objective">
        <div class="objective-icon">${s.objective.icon}</div>
        <div>
          <div class="objective-label">Objective</div>
          <div class="objective-text">${s.objective.text}</div>
        </div>
      </div>`;
    }

    // Lines
    if (s.lines && s.lines.length) {
      html += `<button class="btn btn-reveal" onclick="revealAll(${i})">👁 Reveal All Lines</button>`;
      html += `<div class="lines">`;
      s.lines.forEach((line, li) => {
        const tc = tagColors[line.tag] || 'tag-say';
        const tl = tagLabels[line.tag] || 'SAY';
        html += `<div class="line-card" id="line-${i}-${li}" onclick="revealLine(${i},${li})">
          <div class="line-tag ${tc}">${tl}${line.tag2 ? ' — ' + line.tag2 : ''}</div>
          <div class="line-text hidden" id="lt-${i}-${li}">${line.text}</div>
          <div class="line-hint">Tap to reveal</div>
        </div>`;
      });
      html += `</div>`;
    }

    // Key points
    if (s.keyPoints) {
      html += `<div class="key-points">
        <div class="key-points-title">Key Points to Remember</div>`;
      s.keyPoints.forEach(kp => {
        html += `<div class="key-point"><span class="key-point-bullet">→</span><span>${kp}</span></div>`;
      });
      html += `</div>`;
    }

    // Price table
    if (s.priceTable) {
      html += `<div class="price-table">
        <div class="price-row header"><span>Price Level</span><span>Why It Exists</span><span>Drop</span></div>`;
      s.priceTable.forEach(row => {
        html += `<div class="price-row">
          <span class="price-val">${row.label}</span>
          <span class="price-reason">${row.reason}</span>
          <span>${row.drop}</span>
        </div>`;
      });
      html += `</div>`;
    }

    // Objections
    if (s.objections) {
      html += `<div class="divider"></div>`;
      s.objections.forEach(obj => {
        html += `<div class="objection-block">
          <div class="objection-label">Objection</div>
          <div class="objection-text">${obj.o}</div>
          <div class="response-label">Your Response</div>
          <div class="response-text">${obj.r}</div>
        </div>`;
      });
    }

    // Quiz
    if (s.quiz) {
      html += `<div class="divider"></div>`;
      s.quiz.forEach((q, qi) => {
        html += `<div class="quiz-block">
          <div class="quiz-q">🧠 ${q.q}</div>
          <div class="quiz-options">`;
        q.options.forEach((opt, oi) => {
          html += `<div class="quiz-option" id="qo-${i}-${qi}-${oi}" onclick="answerQuiz(${i},${qi},${oi},${q.correct},'${q.feedback.replace(/'/g,"\\'")}')">
            ${String.fromCharCode(65+oi)}. ${opt}
          </div>`;
        });
        html += `</div>
          <div class="quiz-feedback" id="qf-${i}-${qi}"></div>
        </div>`;
      });
    }

    // Nav buttons
    html += `<div class="btn-row">`;
    if (i > 0) html += `<button class="btn btn-secondary" onclick="goTo(${i-1})">← Previous</button>`;
    html += `<button class="btn btn-primary" onclick="completeAndNext(${i})">${i < sections.length-1 ? 'Mark Done & Continue →' : '🎉 Complete Training'}</button>`;
    html += `</div>`;

    div.innerHTML = html;
    main.appendChild(div);
  });
}

function revealLine(si, li) {
  const lt = document.getElementById(`lt-${si}-${li}`);
  const card = document.getElementById(`line-${si}-${li}`);
  if (lt) { lt.classList.remove('hidden'); card.classList.add('revealed'); }
  const hint = card.querySelector('.line-hint');
  if (hint) hint.style.display = 'none';
}

function revealAll(si) {
  const section = sections[si];
  section.lines.forEach((_, li) => revealLine(si, li));
}

function answerQuiz(si, qi, selected, correct, feedback) {
  const options = document.querySelectorAll(`[id^="qo-${si}-${qi}-"]`);
  options.forEach((opt, oi) => {
    opt.style.pointerEvents = 'none';
    if (oi === correct) opt.classList.add('correct');
    else if (oi === selected && oi !== correct) opt.classList.add('wrong');
  });
  const fb = document.getElementById(`qf-${si}-${qi}`);
  fb.textContent = feedback;
  fb.className = 'quiz-feedback show ' + (selected === correct ? 'good' : 'bad');
}

function goTo(i) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('section-' + i).classList.add('active');
  document.getElementById('nav-' + i).classList.add('active');
  currentSection = i;
  document.querySelector('.main').scrollTop = 0;
  window.scrollTo(0,0);
}

function completeAndNext(i) {
  completed.add(i);
  const navItem = document.getElementById('nav-' + i);
  navItem.classList.add('done');
  updateProgress();
  if (i < sections.length - 1) {
    goTo(i + 1);
  } else {
    showComplete();
  }
}

function showComplete() {
  const main = document.getElementById('mainContent');
  const banner = document.createElement('div');
  banner.className = 'complete-banner';
  banner.innerHTML = `
    <div class="complete-icon">🏆</div>
    <div class="complete-text">
      <h3>Training Complete!</h3>
      <p>You've reviewed all 19 sections of the roofing sales script. Keep practicing until every line feels natural.</p>
    </div>`;
  const lastSection = document.getElementById('section-' + (sections.length-1));
  lastSection.prepend(banner);
}

function updateProgress() {
  const pct = Math.round((completed.size / sections.length) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = completed.size + ' / ' + sections.length;
}

buildNav();
buildSections();
</script>
